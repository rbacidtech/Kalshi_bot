# EdgePulse monitoring stack — DO Droplet (Intel node)
#
# Services:
#   redis      — edge-bus (self-hosted; remove this block if using DO Managed Redis)
#   prometheus — scrapes EdgePulse bot metrics on :9091
#   grafana    — dashboards at http://<DO-IP>:3000  (admin / changeme)
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f

version: "3.9"

services:

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"   # bound to all interfaces — UFW restricts to QuantVPS IP only
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --save 60 1
        --save 300 10
        --appendonly yes
        --appendfsync everysec
        --maxmemory 1gb
        --maxmemory-policy volatile-lru
        --requirepass 0yy_PSMK4ZuOm6rOl5edyUiZ-7uyHz7Ok7jxh4PJmzM
        --rename-command FLUSHALL ""
        --rename-command FLUSHDB ""
        --activedefrag yes
        --active-defrag-ignore-bytes 10mb
        --active-defrag-threshold-lower 10
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "0yy_PSMK4ZuOm6rOl5edyUiZ-7uyHz7Ok7jxh4PJmzM", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "127.0.0.1:5432:5432"   # localhost only — not exposed externally
    environment:
      POSTGRES_DB: edgepulse
      POSTGRES_USER: edgepulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgepulse -d edgepulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "127.0.0.1:9090:9090"   # accessible via SSH tunnel: ssh -L 9090:localhost:9090 root@<DO-IP>
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"    # allow hot config reload via POST /-/reload
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach bot process on the host
    depends_on:
      - redis

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"   # public — protect with DO firewall to your IP only
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=Ep2026!xK9mP
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  postgres-data:
