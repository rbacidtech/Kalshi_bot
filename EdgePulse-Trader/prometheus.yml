# Prometheus scrape config for EdgePulse
# Reload after edits: curl -X POST http://localhost:9090/-/reload

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: "production"

scrape_configs:

  # Intel node (this host — running edgepulse_launch.py in MODE=intel)
  - job_name: "edgepulse-intel"
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          node: "intel-do-nyc3"
    metrics_path: /metrics
    scrape_interval: 15s

  # Exec node (QuantVPS Chicago — running edgepulse_launch.py in MODE=exec)
  # Replace <QUANT_VPS_IP> with the actual QuantVPS private/public IP
  - job_name: "edgepulse-exec"
    static_configs:
      - targets: ["<QUANT_VPS_IP>:9092"]
        labels:
          node: "exec-qvps-chi"
    metrics_path: /metrics
    scrape_interval: 15s

  # Redis — requires redis_exporter sidecar (optional)
  # Uncomment if you run: docker run -d -p 9121:9121 oliver006/redis_exporter
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["host.docker.internal:9121"]
  #   scrape_interval: 30s
