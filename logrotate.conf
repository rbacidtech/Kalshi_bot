# EdgePulse log rotation
# Deploy: sudo cp /root/EdgePulse/logrotate.conf /etc/logrotate.d/edgepulse

/root/EdgePulse/output/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxsize 50M
}

/root/EdgePulse/output/trades.csv {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    postrotate
        # Signal ep_exec to re-open the CSV (copytruncate handles this, but log it)
        logger -t edgepulse "trades.csv rotated"
    endscript
}
