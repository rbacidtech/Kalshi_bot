# EdgePulse log rotation
# Deploy: sudo cp /root/EdgePulse/logrotate.conf /etc/logrotate.d/edgepulse

/var/log/edgepulse/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxsize 100M
    postrotate
        # Notify systemd journal of rotation
        systemctl kill --signal=SIGHUP edgepulse-intel.service \
            edgepulse-exec.service edgepulse-api.service 2>/dev/null || true
    endscript
}
