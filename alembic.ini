[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# DATABASE_URL is injected by env.py from the environment; this placeholder
# is intentionally left invalid so accidental bare `alembic` runs without the
# env var set fail fast rather than silently connecting to a wrong host.
sqlalchemy.url = postgresql+asyncpg://localhost/edgepulse

[post_write_hooks]
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
